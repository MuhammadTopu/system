services:
  app:
    build: .
    ports:
      - "8787:8787"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    container_name: system-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword123
      POSTGRES_DB: testy
    ports:
      - "5432:5432"
    volumes:
      - system_pg:/var/lib/postgresql/data

volumes:
  system_pg: